<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Hamburguesa minimalista -->
  <g filter="url(#shadow)">
    <!-- Pan superior -->
    <rect x="4" y="7" width="16" height="2.5" rx="1" fill="#F1021A"/>
    
    <!-- Carne -->
    <rect x="3.5" y="9" width="17" height="4" rx="1" fill="#8B4513"/>
    
    <!-- Queso -->
    <rect x="4" y="10.5" width="16" height="1" rx="0.5" fill="#FFD700"/>
    
    <!-- Pan inferior -->
    <rect x="4" y="12.5" width="16" height="2.5" rx="1" fill="#F1021A"/>
  </g>
  
  <!-- Punto de hotspot (centro superior) -->
  <circle cx="12" cy="8" r="1" fill="transparent"/>
</svg>
