<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Pan superior -->
  <rect x="6" y="8" width="20" height="4" rx="2" fill="#D4A574" filter="url(#shadow)"/>
  
  <!-- Carne/pan central -->
  <rect x="5" y="11" width="22" height="8" rx="2" fill="#8B4513" filter="url(#shadow)"/>
  
  <!-- Queso -->
  <rect x="6" y="13" width="20" height="2" rx="1" fill="#FFD700" opacity="0.9"/>
  
  <!-- Lechuga -->
  <rect x="6" y="15" width="20" height="1.5" rx="0.5" fill="#90EE90" opacity="0.8"/>
  
  <!-- Pan inferior -->
  <rect x="6" y="18" width="20" height="4" rx="2" fill="#D4A574" filter="url(#shadow)"/>
  
  <!-- Contorno sutil -->
  <rect x="5" y="8" width="22" height="14" rx="2" fill="none" stroke="#654321" stroke-width="0.5" opacity="0.3"/>
</svg>
